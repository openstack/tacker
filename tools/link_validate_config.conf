[general]
base_url = https://docs.openstack.org/tacker/latest/
timeout = 10
allowed_domain = https://docs.openstack.org/
verify_ssl = true

[skip]
extensions = .png, .jpg, .svg, .gif, .pdf, .zip, .tar.gz, .json, .yaml, .yml, .conf
patterns = example.com, localhost, 127.0.0.1, 10., 172.16., 192.168.

